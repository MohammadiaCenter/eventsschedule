<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammadia Center - Portal</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --panel-bg: #1a1c28;
            --text-color: #f3f4f6;
            --muted-text: #9ca3af;
            --border-color: #23263a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .portal-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 8px;
        }

        p {
            font-size: 0.95rem;
            color: var(--muted-text);
            line-height: 1.4;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.03);
            border-color: var(--muted-text);
        }

        footer {
            margin-top: 32px;
            font-size: 0.8rem;
            color: var(--muted-text);
        }
    </style>
</head>
<body>

<div class="portal-container">
    <header>
        <h1>Mohammadia Center</h1>
        <p>Schedule Manager Portal</p>
    </header>

    <div class="button-group">
        <a href="https://mohammadiacenter.github.io/eventsschedule/mobile/" class="btn">Mobile Version</a>
        <a href="https://mohammadiacenter.github.io/eventsschedule/desktop/" class="btn btn-outline">Desktop Version</a>
    </div>

    <footer>
        &copy; Mohammadia Center
    </footer>
</div>

</body>
</html>
