name: Daily WhatsApp Event Notifier

on:
  schedule:
    # Runs everyday at 08:00 AM UTC (Adjust cron schedule to your native timezone)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to trigger it manually via GitHub UI for testing

jobs:
  send-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute notification script
        env:
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_RECIPIENT_ID: ${{ secrets.WHATSAPP_RECIPIENT_ID }}
        run: python send_events.py
