<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammadia Center | Professional Email System</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --primary: #0B5B4A;
            --accent: #D4AF37;
            --dark: #1a2521;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f8f9f7 0%, #e8edeb 100%); }
        
        .header { background: var(--primary); color: white; padding: 1.5rem 0; box-shadow: 0 4px 12px rgba(11, 91, 74, 0.3); }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: linear-gradient(90deg, var(--primary), #0f6b57); color: white; padding: 1.75rem 2rem; }
        .main-content { padding: 2.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); }

        input, select, textarea {
            width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;
        }

        /* Rich Text Editor */
        #editor {
            width: 100%;
            min-height: 320px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            outline: none;
            overflow-y: auto;
            line-height: 1.6;
            font-size: 1rem;
        }
        .toolbar {
            background: #f8f9f7;
            padding: 8px;
            border: 2px solid #e5e7eb;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .toolbar button {
            padding: 6px 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .email-preview {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 25px;
            background: white;
            min-height: 380px;
            overflow-y: auto;
            line-height: 1.7;
        }

        .attachments-list {
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .status { margin-top: 1rem; padding: 12px; border-radius: 8px; text-align: center; font-weight: 500; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header class="header">
        <div style="max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;font-size:1.5rem;font-weight:700;">
                <i class="fas fa-mosque"></i>
                <span>Mohammadia Center</span>
            </div>
            <h1 style="font-size:1.4rem;">Professional Email System</h1>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Send Official Communication</h2>
            </div>
            <div class="main-content">
                <button id="loginBtn" style="padding:16px 40px;font-size:1.1rem;">
                    <i class="fas fa-sign-in-alt"></i> Sign in with Microsoft
                </button>

                <div id="emailForm" style="display:none; margin-top:2rem;">
                    <div class="form-grid">
                        <!-- Left Column -->
                        <div>
                            <div class="form-group">
                                <label>Manual To (Optional)</label>
                                <input type="email" id="to" placeholder="recipient@example.com">
                            </div>
                            <div class="form-group">
                                <label>CC (Optional)</label>
                                <input type="email" id="cc" placeholder="cc@example.com">
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-address-book"></i> Contacts</label>
                                <button onclick="loadContacts()" style="margin-bottom:12px;">
                                    <i class="fas fa-sync"></i> Load My Contacts
                                </button>
                                <div class="contacts-section">
                                    <div class="contacts-header">
                                        <label style="margin:0; cursor:pointer;">
                                            <input type="checkbox" id="selectAllMaster" onchange="toggleSelectAll(this)">
                                            <strong>Select All Contacts</strong>
                                        </label>
                                        <span id="count" style="font-size:0.9rem;color:#666;"></span>
                                    </div>
                                    <div class="contacts-list" id="contactsList"></div>
                                </div>
                                <div style="margin-top:12px; display:flex; gap:8px;">
                                    <button onclick="selectAllContacts()" style="flex:1;">Select All</button>
                                    <button onclick="clearSelection()" style="flex:1;">Clear</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <button onclick="sendToAllContacts()" style="background:#D4AF37; color:#1a2521; width:100%;">
                                    <i class="fas fa-users"></i> Send to ALL Contacts
                                </button>
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div>
                            <div class="form-group">
                                <label>Subject</label>
                                <input type="text" id="subject" placeholder="Subject" required>
                            </div>

                            <div class="form-group">
                                <label>Your Custom Message (Rich Text)</label>
                                <div class="toolbar">
                                    <button onclick="document.execCommand('bold')" title="Bold"><b>B</b></button>
                                    <button onclick="document.execCommand('italic')" title="Italic"><i>I</i></button>
                                    <button onclick="document.execCommand('underline')" title="Underline"><u>U</u></button>
                                    <button onclick="document.execCommand('insertUnorderedList')" title="Bullet List">•</button>
                                    <button onclick="document.execCommand('justifyLeft')" title="Align Left">Left</button>
                                    <button onclick="document.execCommand('justifyCenter')" title="Align Center">Center</button>
                                </div>
                                <div id="editor" contenteditable="true" placeholder="Write your message here..."></div>
                            </div>

                            <div class="form-group">
                                <label>Attachments</label>
                                <input type="file" id="attachments" multiple>
                                <div id="attachmentsList" class="attachments-list"></div>
                            </div>

                            <div class="form-group">
                                <label>HTML Email Preview</label>
                                <div id="htmlPreview" class="email-preview"></div>
                            </div>
                        </div>
                    </div>

                    <div style="text-align:center; margin-top:2rem;">
                        <button id="sendBtn" style="padding:16px 40px; font-size:1.2rem;" onclick="sendEmail(false)">
                            <i class="fas fa-paper-plane"></i> Send to Selected Recipients
                        </button>
                    </div>

                    <div id="status" class="status" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad",
                authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6",
                redirectUri: "https://mohammadiacenter.github.io/eventsschedule/email.html"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allContacts = [];
        let attachedFiles = [];

        document.getElementById("loginBtn").onclick = async () => {
            try {
                await msalInstance.loginPopup({ scopes: ["Mail.Send", "User.Read", "Contacts.Read"] });
                document.getElementById("emailForm").style.display = "block";
                document.getElementById("loginBtn").style.display = "none";
            } catch (e) { alert("Login failed."); }
        };

        // Contacts functions (unchanged)
        async function loadContacts() { /* ... same as before ... */ 
            // (Copy from previous version if needed)
        }
        function renderContacts() { /* ... */ }
        function toggleSelectAll(cb) { document.querySelectorAll('.contact-check').forEach(c => c.checked = cb.checked); }
        function selectAllContacts() { document.getElementById("selectAllMaster").checked = true; toggleSelectAll(document.getElementById("selectAllMaster")); }
        function clearSelection() { document.getElementById("selectAllMaster").checked = false; toggleSelectAll(document.getElementById("selectAllMaster")); }
        function getSelectedEmails() {
            return Array.from(document.querySelectorAll('.contact-check:checked')).map(cb => cb.dataset.email).filter(Boolean);
        }

        // Rich Text Preview
        function updatePreview() {
            const editorContent = document.getElementById("editor").innerHTML;
            document.getElementById("htmlPreview").innerHTML = editorContent || "<p style='color:#888;'>Preview will appear here...</p>";
        }

        document.getElementById("editor").addEventListener("input", updatePreview);

        // Attachments
        document.getElementById("attachments").addEventListener("change", function(e) {
            attachedFiles = Array.from(e.target.files);
            const list = document.getElementById("attachmentsList");
            list.innerHTML = attachedFiles.map(f => `<div>📎 ${f.name} (${(f.size/1024).toFixed(1)} KB)</div>`).join('');
        });

        async function sendEmail(toAll = false) {
            const status = document.getElementById("status");
            status.style.display = "block";
            status.textContent = "Sending...";
            status.className = "status";

            try {
                const tokenResponse = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });

                const subject = document.getElementById("subject").value || "Message from Mohammadia Center";
                const bodyContent = document.getElementById("editor").innerHTML;

                // BCC Logic
                let toRecipients = [{ emailAddress: { address: "info@mohammadia.org" } }];
                let bccRecipients = [];

                if (toAll || getSelectedEmails().length > 0) {
                    bccRecipients = toAll 
                        ? allContacts.map(c => ({ emailAddress: { address: c.emailAddresses?.[0]?.address } })).filter(r => r.emailAddress.address)
                        : getSelectedEmails().map(email => ({ emailAddress: { address: email } }));
                } else {
                    const manualTo = document.getElementById("to").value.trim();
                    if (manualTo) toRecipients = [{ emailAddress: { address: manualTo } }];
                }

                const emailData = {
                    message: {
                        subject: subject,
                        body: {
                            contentType: "HTML",
                            content: bodyContent || "<p>No content</p>"
                        },
                        toRecipients: toRecipients,
                        bccRecipients: bccRecipients.length ? bccRecipients : undefined
                    }
                };

                const cc = document.getElementById("cc").value.trim();
                if (cc) emailData.message.ccRecipients = [{ emailAddress: { address: cc } }];

                const response = await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer ${tokenResponse.accessToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(emailData)
                });

                if (response.ok) {
                    status.textContent = `✅ Email sent successfully!`;
                    status.className = "status success";
                } else throw new Error();
            } catch (err) {
                status.textContent = "❌ Failed to send email.";
                status.className = "status error";
            }
        }

        function sendToAllContacts() {
            if (allContacts.length === 0) return alert("Please load contacts first.");
            if (confirm(`Send to all ${allContacts.length} contacts?`)) sendEmail(true);
        }
    </script>
</body>
</html>
