<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammadia Center | Professional Email System</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #0B5B4A;
            --accent: #D4AF37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f8f9f7 0%, #e8edeb 100%); }

        .header { background: var(--primary); color: white; padding: 1.5rem 0; box-shadow: 0 4px 12px rgba(11, 91, 74, 0.3); }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }

        .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: linear-gradient(90deg, var(--primary), #0f6b57); color: white; padding: 1.75rem 2rem; }

        .main-content { padding: 2.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1a2521; }

        input, select, textarea {
            width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;
        }
        textarea { line-height: 1.6; }

        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
        .preview-btn { background: var(--accent); color: #1a2521; font-weight: 600; }

        .contacts-section { border: 2px solid #e5e7eb; border-radius: 12px; padding: 15px; background: #fafcfc; }
        .contacts-list { max-height: 420px; overflow-y: auto; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; }
        .contact-item:hover { background: #f0f7f5; }

        .email-preview {
            border: 2px solid #e5e7eb; 
            border-radius: 12px; 
            padding: 25px; 
            background: white;
            min-height: 400px; 
            overflow-y: auto; 
            line-height: 1.7;
        }
        .status { margin-top: 1rem; padding: 12px; border-radius: 8px; text-align: center; font-weight: 500; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header class="header">
        <div style="max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;font-size:1.5rem;font-weight:700;">
                <i class="fas fa-mosque"></i>
                <span>Mohammadia Center</span>
            </div>
            <h1 style="font-size:1.4rem;">Professional Email System</h1>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Send Official Communication</h2>
            </div>

            <div class="main-content">
                <button id="loginBtn" style="padding:16px 40px;font-size:1.1rem;">
                    <i class="fas fa-sign-in-alt"></i> Sign in with Microsoft
                </button>

                <div id="emailForm" style="display:none; margin-top:2rem;">
                    <div class="form-grid">
                        <div>
                            <!-- Contacts Section -->
                            <div class="form-group">
                                <label><i class="fas fa-address-book"></i> Contacts</label>
                                <button onclick="loadContacts()" style="margin-bottom:12px; width:100%;">
                                    <i class="fas fa-sync"></i> Load My Contacts
                                </button>
                                <div class="contacts-section">
                                    <div class="contacts-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                                        <label><input type="checkbox" id="selectAllMaster" onchange="toggleSelectAll(this)"> <strong>Select All</strong></label>
                                        <span id="count" style="color:#666;"></span>
                                    </div>
                                    <div class="contacts-list" id="contactsList"></div>
                                </div>
                            </div>

                            <div style="display:flex; gap:8px; margin-top:10px;">
                                <button onclick="selectAllContacts()" style="flex:1;">Select All</button>
                                <button onclick="clearSelection()" style="flex:1;">Clear</button>
                            </div>
                        </div>

                        <div>
                            <div class="form-group">
                                <label>Subject</label>
                                <input type="text" id="subject" placeholder="Subject">
                            </div>

                            <div class="form-group">
                                <label>Email Template</label>
                                <div style="display:flex; gap:10px;">
                                    <select id="templateSelect" onchange="previewTemplate()">
                                        <option value="plain">No Template</option>
                                        <option value="announcement" selected>Event Announcement</option>
                                        <option value="reminder">Reminder</option>
                                        <option value="newsletter">Newsletter</option>
                                        <option value="donation">Donation Appeal</option>
                                        <option value="thankyou">Thank You</option>
                                    </select>
                                    <button class="preview-btn" onclick="previewTemplate()">Preview</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Your Custom Message</label>
                                <textarea id="body" rows="14" oninput="previewTemplate()"></textarea>
                            </div>

                            <div class="form-group">
                                <label>HTML Preview</label>
                                <div id="htmlPreview" class="email-preview"></div>
                            </div>
                        </div>
                    </div>

                    <div style="text-align:center; margin-top:2rem;">
                        <button onclick="sendEmail(false)" style="padding:16px 40px; font-size:1.2rem;">
                            <i class="fas fa-paper-plane"></i> Send to Selected
                        </button>
                    </div>

                    <div id="status" class="status" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad",
                authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6",
                redirectUri: "https://mohammadiacenter.github.io/eventsschedule/email.html"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allContacts = [];

        const templates = {
            plain: { header: "", footer: "", subject: "" },
            announcement: {
                subject: "Important Announcement - Mohammadia Center",
                header: `<div style="background:#0B5B4A;color:white;padding:25px;text-align:center;border-radius:8px 8px 0 0;"><h2 style="margin:0;">🌟 Important Announcement</h2></div><div style="padding:25px;line-height:1.7;">`,
                footer: `<p>JazakAllah khair for your continued support.</p><p>Best regards,<br><strong>Mohammadia Center Team</strong></p></div>`
            },
            // Add other templates similarly...
            reminder: { /* copy from previous */ },
            newsletter: { /* ... */ },
            donation: { /* ... */ },
            thankyou: { /* ... */ }
        };

        document.getElementById("loginBtn").onclick = async () => {
            try {
                await msalInstance.loginPopup({ scopes: ["Mail.Send", "User.Read", "Contacts.Read"] });
                document.getElementById("emailForm").style.display = "block";
                document.getElementById("loginBtn").style.display = "none";
            } catch (e) { alert("Login failed."); }
        };

        async function loadContacts() { /* same improved version as last */ 
            // ... (use the loadContacts function from previous response)
        }

        // renderContacts, toggleSelectAll, etc. same as before

        function nl2br(str) { return str ? str.replace(/\n/g, '<br>') : ''; }

        function previewTemplate() {
            const key = document.getElementById("templateSelect").value;
            const msg = document.getElementById("body").value.trim();
            const div = document.getElementById("htmlPreview");
            const t = templates[key];

            let content = key === "plain" 
                ? nl2br(msg)
                : t.header + `<br><p style="margin:25px 0;">${nl2br(msg)}</p><br>` + t.footer;

            div.innerHTML = content || "Preview appears here";
        }

        async function sendEmail(toAll = false) {
            const status = document.getElementById("status");
            status.style.display = "block";
            status.textContent = "Sending...";

            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });
                const key = document.getElementById("templateSelect").value;
                const custom = document.getElementById("body").value.trim();
                const t = templates[key];

                const messageHtml = custom ? `<br><p style="margin:25px 0;">${nl2br(custom)}</p><br>` : '';
                const finalHtml = key === "plain" ? nl2br(custom) : t.header + messageHtml + t.footer;

                let toRecipients = [];
                let bccRecipients = [];

                if (toAll || getSelectedEmails().length > 1) {
                    toRecipients = [{ emailAddress: { address: "info@mohammadia.org" } }];
                    bccRecipients = (toAll ? allContacts : getSelectedEmails().map(e => ({emailAddress:{address:e}})));
                } else {
                    toRecipients = [{ emailAddress: { address: document.getElementById("to").value || "info@mohammadia.org" } }];
                }

                const emailData = {
                    message: {
                        subject: document.getElementById("subject").value || t.subject || "Message from Mohammadia Center",
                        body: { contentType: "HTML", content: finalHtml },
                        toRecipients: toRecipients,
                        bccRecipients: bccRecipients.length ? bccRecipients : undefined
                    }
                };

                const res = await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer ${token.accessToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(emailData)
                });

                if (res.ok) {
                    status.innerHTML = `✅ Email sent successfully!`;
                    status.className = "status success";
                } else throw new Error();
            } catch (err) {
                status.textContent = "❌ Failed to send.";
                status.className = "status error";
            }
        }

        // Add missing helper functions (getSelectedEmails, sendToAllContacts, etc.)
    </script>
</body>
</html>
