<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammadia Center - Communications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f2f9f8',
                            100: '#e0f2ee',
                            500: '#0B5B4A',
                            600: '#094a3c',
                            700: '#073a2f',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        #editor { min-height: 400px; transition: all 0.2s ease; }
        #editor:empty:before { content: attr(placeholder); color: #94a3b8; pointer-events: none; display: block; }
        #editor:focus { outline: none; }
        .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col text-slate-800">

    <header class="bg-white border-b border-slate-200 z-10 relative shadow-sm">
        <div class="w-full px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-brand-50 rounded-xl flex items-center justify-center text-brand-500 shadow-sm border border-brand-100">
                    <i class="fas fa-mosque text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-semibold tracking-tight text-slate-900 leading-tight">Mohammadia Center</h1>
                    <p class="text-sm text-slate-500 font-medium">Campaign Manager</p>
                </div>
            </div>
            <button onclick="sendEmail(false)" class="bg-brand-500 hover:bg-brand-600 text-white px-6 py-2.5 rounded-lg font-medium flex items-center gap-2 transition-all">
                <i class="fas fa-paper-plane text-sm"></i> Send Message
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden w-full">
        <main class="flex-1 flex flex-col bg-[#F8FAFC]">
            <div class="flex-1 max-w-5xl w-full mx-auto p-8 flex flex-col h-full">
                <div class="bg-white rounded-2xl shadow-soft border border-slate-200 flex flex-col flex-1 overflow-hidden">
                    
                    <div class="px-8 py-2 border-b border-slate-100">
                        <div class="py-3 border-b border-slate-100/60"><input id="to" type="email" placeholder="To: info@mohammadia.org" class="w-full bg-transparent border-none focus:ring-0 outline-none"></div>
                        <div class="py-4"><input id="subject" type="text" placeholder="Message Subject" class="w-full bg-transparent border-none focus:ring-0 text-xl font-semibold outline-none"></div>
                    </div>

                    <!-- Clean Toolbar (Images Removed) -->
                    <div class="bg-slate-50/80 border-b border-slate-100 px-6 py-2 flex flex-wrap items-center gap-2">
                        <div class="flex items-center bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
                            <button onclick="document.execCommand('bold')" class="w-8 h-8 rounded hover:bg-slate-100"><i class="fas fa-bold"></i></button>
                            <button onclick="document.execCommand('italic')" class="w-8 h-8 rounded hover:bg-slate-100"><i class="fas fa-italic"></i></button>
                            <button onclick="document.execCommand('underline')" class="w-8 h-8 rounded hover:bg-slate-100"><i class="fas fa-underline"></i></button>
                        </div>
                        <select onchange="document.execCommand('fontSize', false, this.value); this.selectedIndex=0;" class="h-8 px-2 text-sm bg-white border border-slate-200 rounded-lg outline-none">
                            <option value="" disabled selected>Size</option>
                            <option value="2">Small</option> <option value="3">Normal</option> <option value="5">Large</option>
                        </select>
                        <div class="flex items-center bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
                            <input type="color" onchange="document.execCommand('foreColor', false, this.value)" class="w-8 h-8 border-none cursor-pointer" title="Text Color">
                        </div>
                        <button onclick="document.execCommand('removeFormat')" class="w-8 h-8 rounded hover:bg-red-50 text-slate-600"><i class="fas fa-eraser"></i></button>
                    </div>

                    <div id="editor" contenteditable="true" class="flex-1 p-8 overflow-y-auto text-slate-700" placeholder="Compose your message here..."></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    <script>
        const msalInstance = new msal.PublicClientApplication({ auth: { clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad", authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6", redirectUri: window.location.origin + window.location.pathname } });

        async function sendEmail() {
            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });
                const bodyHtml = document.getElementById("editor").innerHTML;
                const subject = document.getElementById("subject").value || "Update from Mohammadia";
                const toVal = document.getElementById("to").value || "info@mohammadia.org";

                const emailData = {
                    message: {
                        subject: subject,
                        body: { contentType: "HTML", content: bodyHtml },
                        toRecipients: [{ emailAddress: { address: toVal } }]
                    }
                };

                const response = await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token.accessToken}`, "Content-Type": "application/json" },
                    body: JSON.stringify(emailData)
                });

                if (response.ok) alert("Sent successfully!");
                else throw new Error("API Error");
            } catch (err) {
                alert("Failed to send: " + err.message);
            }
        }
    </script>
</body>
</html>
