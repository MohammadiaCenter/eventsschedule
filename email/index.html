<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Message - Mohammadia Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    colors: {
                        primary: '#0B5B4A',
                        accent: '#D4AF37',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        #editor { min-height: 420px; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Top Bar -->
    <header class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-screen-2xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-mosque text-2xl text-primary"></i>
                <div>
                    <h1 class="text-xl font-semibold text-gray-800">Mohammadia Center</h1>
                    <p class="text-xs text-gray-500 -mt-1">New Message</p>
                </div>
            </div>
            <button onclick="sendEmail(false)" 
                    class="bg-primary hover:bg-emerald-700 text-white px-8 py-2.5 rounded-xl font-medium flex items-center gap-2 transition">
                <i class="fas fa-paper-plane"></i>
                <span>Send</span>
            </button>
        </div>
    </header>

    <div class="max-w-screen-2xl mx-auto flex h-[calc(100vh-73px)]">
        
        <!-- Sidebar - Contacts -->
        <div class="w-80 border-r border-gray-200 bg-white overflow-y-auto">
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-semibold text-lg">Contacts</h2>
                    <button onclick="loadContacts()" 
                            class="text-primary hover:text-emerald-700 flex items-center gap-2 text-sm font-medium">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                </div>

                <button onclick="loadContacts()" 
                        class="w-full bg-primary text-white py-3 rounded-2xl font-medium mb-6 hover:bg-emerald-700 transition">
                    Load My Contacts
                </button>

                <div class="mb-3 flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="selectAllMaster" onchange="toggleSelectAll(this)" class="w-4 h-4 accent-primary">
                        <span class="font-medium">Select All</span>
                    </label>
                    <span id="count" class="text-gray-500 text-xs"></span>
                </div>

                <div id="contactsList" class="space-y-1 max-h-[calc(100vh-340px)] overflow-y-auto pr-2"></div>

                <div class="mt-6 flex gap-3">
                    <button onclick="selectAllContacts()" 
                            class="flex-1 py-2.5 text-sm font-medium border border-gray-300 rounded-2xl hover:bg-gray-50">
                        Select All
                    </button>
                    <button onclick="clearSelection()" 
                            class="flex-1 py-2.5 text-sm font-medium border border-gray-300 rounded-2xl hover:bg-gray-50">
                        Clear
                    </button>
                </div>

                <button onclick="sendToAllContacts()" 
                        class="mt-8 w-full bg-amber-400 hover:bg-amber-500 text-gray-900 py-3.5 rounded-3xl font-semibold flex items-center justify-center gap-2">
                    <i class="fas fa-users"></i>
                    Send to All Contacts (BCC)
                </button>
            </div>
        </div>

        <!-- Main Compose Area -->
        <div class="flex-1 flex flex-col bg-white">
            <!-- Fields -->
            <div class="border-b border-gray-100 p-6 space-y-5">
                <div class="flex gap-4">
                    <div class="w-20 text-right text-sm font-medium text-gray-600 pt-2">To</div>
                    <input id="to" type="email" placeholder="info@mohammadia.org" 
                           class="flex-1 border border-gray-200 focus:border-primary rounded-2xl px-5 py-3 outline-none">
                </div>
                <div class="flex gap-4">
                    <div class="w-20 text-right text-sm font-medium text-gray-600 pt-2">Cc</div>
                    <input id="cc" type="email" placeholder="Optional" 
                           class="flex-1 border border-gray-200 focus:border-primary rounded-2xl px-5 py-3 outline-none">
                </div>
                <div class="flex gap-4">
                    <div class="w-20 text-right text-sm font-medium text-gray-600 pt-2">Subject</div>
                    <input id="subject" type="text" placeholder="Important Announcement" 
                           class="flex-1 border border-gray-200 focus:border-primary rounded-2xl px-5 py-3 outline-none">
                </div>
            </div>

            <!-- Toolbar -->
            <div class="bg-gray-50 border-b border-gray-100 px-6 py-3 flex items-center gap-2">
                <button onclick="document.execCommand('bold')" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center"><b>B</b></button>
                <button onclick="document.execCommand('italic')" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center"><i>I</i></button>
                <button onclick="document.execCommand('underline')" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center"><u>U</u></button>
                <button onclick="document.execCommand('insertUnorderedList')" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center">•</button>
                <button onclick="document.execCommand('justifyLeft')" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center">⇤</button>
                <button onclick="document.execCommand('justifyCenter')" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center">↔</button>
            </div>

            <!-- Rich Text Editor -->
            <div id="editor" contenteditable="true" 
                 class="flex-1 p-8 focus:outline-none text-[17px] leading-relaxed overflow-y-auto"
                 placeholder="Write your message here..."></div>

            <!-- Status -->
            <div id="status" class="hidden fixed bottom-6 right-6 px-6 py-3 rounded-2xl shadow-xl text-white"></div>
        </div>
    </div>

    <script>
        const msalConfig = { /* same as before */ 
            auth: {
                clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad",
                authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6",
                redirectUri: "https://mohammadiacenter.github.io/eventsschedule/email.html"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allContacts = [];

        // Login on load
        window.onload = async () => {
            try {
                await msalInstance.loginPopup({ scopes: ["Mail.Send", "User.Read", "Contacts.Read"] });
            } catch (e) {}
            document.getElementById("editor").focus();
        };

        async function loadContacts() {
            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Contacts.Read"] });
                const res = await fetch("https://graph.microsoft.com/v1.0/me/contacts?$top=300&$select=displayName,emailAddresses", {
                    headers: { Authorization: `Bearer ${token.accessToken}` }
                });
                const data = await res.json();
                allContacts = data.value || [];
                renderContacts();
            } catch (err) {
                showStatus("Failed to load contacts", "error");
            }
        }

        function renderContacts() {
            const container = document.getElementById("contactsList");
            container.innerHTML = allContacts.map(c => `
                <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 rounded-2xl cursor-pointer">
                    <input type="checkbox" class="contact-check w-5 h-5 accent-primary" 
                           data-email="${c.emailAddresses?.[0]?.address || ''}">
                    <div class="flex-1">
                        <div class="font-medium">${c.displayName || 'Unnamed'}</div>
                        <div class="text-sm text-gray-500">${c.emailAddresses?.[0]?.address || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleSelectAll(cb) { document.querySelectorAll('.contact-check').forEach(c => c.checked = cb.checked); }
        function selectAllContacts() { toggleSelectAll({checked:true}); }
        function clearSelection() { toggleSelectAll({checked:false}); }
        function getSelectedEmails() {
            return Array.from(document.querySelectorAll('.contact-check:checked')).map(cb => cb.dataset.email).filter(Boolean);
        }

        function showStatus(msg, type = "success") {
            const status = document.getElementById("status");
            status.textContent = msg;
            status.className = `fixed bottom-6 right-6 px-6 py-3 rounded-2xl shadow-xl text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 4000);
        }

        async function sendEmail(toAll = false) {
            const status = document.getElementById("status");
            status.textContent = "Sending...";
            status.className = "fixed bottom-6 right-6 px-6 py-3 rounded-2xl shadow-xl text-white bg-blue-600";
            status.classList.remove('hidden');

            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });
                const bodyHtml = document.getElementById("editor").innerHTML;
                const subject = document.getElementById("subject").value || "Message from Mohammadia Center";

                let toRecipients = [{ emailAddress: { address: "info@mohammadia.org" } }];
                let bccRecipients = toAll || getSelectedEmails().length > 0 
                    ? (toAll ? allContacts : getSelectedEmails()).map(e => ({ emailAddress: { address: typeof e === 'string' ? e : e.emailAddresses?.[0]?.address } })).filter(Boolean)
                    : [];

                const emailData = {
                    message: {
                        subject: subject,
                        body: { contentType: "HTML", content: bodyHtml || "<p>No content</p>" },
                        toRecipients: toRecipients,
                        bccRecipients: bccRecipients.length ? bccRecipients : undefined
                    }
                };

                const response = await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token.accessToken}`, "Content-Type": "application/json" },
                    body: JSON.stringify(emailData)
                });

                if (response.ok) {
                    showStatus("✅ Email sent successfully!", "success");
                } else throw new Error();
            } catch (err) {
                showStatus("❌ Failed to send email", "error");
            }
        }

        function sendToAllContacts() {
            if (allContacts.length === 0) return alert("Please load contacts first");
            if (confirm(`Send to all ${allContacts.length} contacts using BCC?`)) sendEmail(true);
        }
    </script>
</body>
</html>
