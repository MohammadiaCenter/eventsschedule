<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Message - Outlook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    colors: {
                        outlook: '#0078d4',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap');
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        #editor { min-height: 460px; }
        .outlook-input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
        }
    </style>
</head>
<body class="bg-[#f3f2f1] h-screen overflow-hidden">

    <!-- Top Ribbon -->
    <div class="bg-white border-b border-gray-300 px-4 py-2 flex items-center gap-3 shadow-sm">
        <button onclick="sendEmail(false)" 
                class="bg-[#0078d4] hover:bg-[#106ebe] text-white px-6 py-1.5 rounded flex items-center gap-2 font-medium">
            <i class="fas fa-paper-plane"></i>
            <span>Send</span>
        </button>
        <button onclick="window.location.reload()" 
                class="px-5 py-1.5 hover:bg-gray-100 rounded text-gray-700 flex items-center gap-2">
            <i class="fas fa-trash"></i>
            Discard
        </button>
        <div class="ml-auto flex items-center gap-4 text-gray-600">
            <i class="fas fa-ellipsis-h"></i>
        </div>
    </div>

    <div class="flex h-[calc(100vh-53px)]">
        
        <!-- Left Sidebar -->
        <div class="w-72 bg-white border-r border-gray-200 overflow-y-auto">
            <div class="p-4">
                <h3 class="font-semibold mb-3 text-gray-700">Contacts</h3>
                <button onclick="loadContacts()" 
                        class="w-full bg-[#0078d4] text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <i class="fas fa-sync"></i> Load Contacts
                </button>

                <div class="mt-6">
                    <label class="flex items-center gap-2 text-sm mb-2 cursor-pointer">
                        <input type="checkbox" id="selectAllMaster" onchange="toggleSelectAll(this)" class="w-4 h-4">
                        <span class="font-medium">Select All Contacts</span>
                    </label>
                    <div id="contactsList" class="max-h-[calc(100vh-280px)] overflow-y-auto pr-2 space-y-1"></div>
                </div>
            </div>
        </div>

        <!-- Compose Area -->
        <div class="flex-1 flex flex-col bg-white">
            
            <!-- Recipient Fields -->
            <div class="border-b border-gray-200 px-6 py-4 space-y-3">
                <div class="flex items-center gap-3">
                    <span class="w-12 text-right text-gray-600 font-medium">To</span>
                    <input id="to" type="text" placeholder="info@mohammadia.org" 
                           class="outlook-input border border-gray-300 focus:border-[#0078d4] rounded px-4 py-2">
                </div>
                <div class="flex items-center gap-3">
                    <span class="w-12 text-right text-gray-600 font-medium">Cc</span>
                    <input id="cc" type="text" placeholder="" 
                           class="outlook-input border border-gray-300 focus:border-[#0078d4] rounded px-4 py-2">
                </div>
                <div class="flex items-center gap-3">
                    <span class="w-12 text-right text-gray-600 font-medium">Subject</span>
                    <input id="subject" type="text" placeholder="Important Announcement" 
                           class="outlook-input border border-gray-300 focus:border-[#0078d4] rounded px-4 py-2">
                </div>
            </div>

            <!-- Formatting Toolbar -->
            <div class="bg-gray-50 border-b border-gray-200 px-6 py-2 flex items-center gap-1">
                <button onclick="document.execCommand('bold')" class="hover:bg-gray-200 p-2 rounded"><b>B</b></button>
                <button onclick="document.execCommand('italic')" class="hover:bg-gray-200 p-2 rounded"><i>I</i></button>
                <button onclick="document.execCommand('underline')" class="hover:bg-gray-200 p-2 rounded"><u>U</u></button>
                <button onclick="document.execCommand('insertUnorderedList')" class="hover:bg-gray-200 p-2 rounded">•</button>
                <button onclick="document.execCommand('justifyLeft')" class="hover:bg-gray-200 p-2 rounded">Left</button>
                <button onclick="document.execCommand('justifyCenter')" class="hover:bg-gray-200 p-2 rounded">Center</button>
            </div>

            <!-- Rich Text Editor -->
            <div id="editor" contenteditable="true" 
                 class="flex-1 p-8 text-[17px] leading-relaxed focus:outline-none overflow-auto"
                 placeholder="Type your message here..."></div>
        </div>
    </div>

    <div id="status" class="fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg hidden"></div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad",
                authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6",
                redirectUri: "https://mohammadiacenter.github.io/eventsschedule/email.html"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allContacts = [];

        window.onload = () => {
            document.getElementById("editor").focus();
        };

        async function loadContacts() {
            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Contacts.Read"] });
                const res = await fetch("https://graph.microsoft.com/v1.0/me/contacts?$top=300&$select=displayName,emailAddresses", {
                    headers: { Authorization: `Bearer ${token.accessToken}` }
                });
                const data = await res.json();
                allContacts = data.value || [];
                renderContacts();
            } catch (e) {
                showStatus("Failed to load contacts", false);
            }
        }

        function renderContacts() {
            const container = document.getElementById("contactsList");
            container.innerHTML = allContacts.map(contact => `
                <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
                    <input type="checkbox" class="contact-check w-5 h-5" data-email="${contact.emailAddresses?.[0]?.address || ''}">
                    <div>
                        <div class="font-medium">${contact.displayName || 'Unnamed'}</div>
                        <div class="text-sm text-gray-500">${contact.emailAddresses?.[0]?.address || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleSelectAll(cb) {
            document.querySelectorAll('.contact-check').forEach(c => c.checked = cb.checked);
        }
        function selectAllContacts() { toggleSelectAll({checked: true}); }
        function clearSelection() { toggleSelectAll({checked: false}); }
        function getSelectedEmails() {
            return Array.from(document.querySelectorAll('.contact-check:checked'))
                        .map(cb => cb.dataset.email).filter(Boolean);
        }

        function showStatus(text, success = true) {
            const el = document.getElementById("status");
            el.textContent = text;
            el.className = `fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg text-white ${success ? 'bg-green-600' : 'bg-red-600'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        async function sendEmail(toAll = false) {
            const statusEl = document.getElementById("status");
            statusEl.textContent = "Sending...";
            statusEl.className = "fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg bg-blue-600 text-white";
            statusEl.classList.remove('hidden');

            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });
                const body = document.getElementById("editor").innerHTML;
                const subject = document.getElementById("subject").value || "Message from Mohammadia Center";

                let toRecipients = [{ emailAddress: { address: "info@mohammadia.org" } }];
                let bccRecipients = [];

                if (toAll || getSelectedEmails().length > 0) {
                    bccRecipients = (toAll ? allContacts : getSelectedEmails()).map(item => ({
                        emailAddress: { address: typeof item === 'string' ? item : item.emailAddresses?.[0]?.address }
                    })).filter(r => r.emailAddress.address);
                }

                const emailData = {
                    message: {
                        subject: subject,
                        body: { contentType: "HTML", content: body || "<p>No content</p>" },
                        toRecipients: toRecipients,
                        bccRecipients: bccRecipients.length ? bccRecipients : undefined
                    }
                };

                const res = await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token.accessToken}`, "Content-Type": "application/json" },
                    body: JSON.stringify(emailData)
                });

                if (res.ok) showStatus("✅ Email sent successfully!", true);
                else throw new Error();
            } catch (err) {
                showStatus("❌ Failed to send email", false);
            }
        }

        function sendToAllContacts() {
            if (allContacts.length === 0) return alert("Please load contacts first");
            if (confirm(`Send to all ${allContacts.length} contacts using BCC?`)) sendEmail(true);
        }
    </script>
</body>
</html>
