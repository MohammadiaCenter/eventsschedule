<!DOCTYPE html>
<html>
<head>
    <title>Email Sender App</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>
<body>
    <button id="loginBtn">Login</button>
    <div id="emailForm" style="display:none;">
        <input id="to" placeholder="Recipient Email" />
        <input id="subject" placeholder="Subject" />
        <textarea id="body" placeholder="Message"></textarea>
        <button id="sendBtn">Send Email</button>
    </div>

    <script>
const msalConfig = {
    auth: {
        clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad", // Copy this from your App Overview page
        authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6",
        redirectUri: "https://mohammadiacenter.github.io/eventsschedule/email.html" 
    }
};
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        document.getElementById("loginBtn").onclick = async () => {
            const response = await msalInstance.loginPopup({ scopes: ["Mail.Send"] });
            document.getElementById("emailForm").style.display = "block";
        };

        document.getElementById("sendBtn").onclick = async () => {
            const tokenResponse = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });
            const emailData = {
                message: {
                    subject: document.getElementById("subject").value,
                    body: { contentType: "Text", content: document.getElementById("body").value },
                    toRecipients: [{ emailAddress: { address: document.getElementById("to").value } }]
                }
            };

            await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                method: "POST",
                headers: { 
                    Authorization: `Bearer ${tokenResponse.accessToken}`,
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify(emailData)
            });
            alert("Email sent!");
        };
    </script>
</body>
</html>
