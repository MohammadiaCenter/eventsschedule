<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammadia Center | Professional Email System</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #0B5B4A;
            --accent: #D4AF37;
            --dark: #1a2521;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f8f9f7 0%, #e8edeb 100%); }

        .header { background: var(--primary); color: white; padding: 1.5rem 0; box-shadow: 0 4px 12px rgba(11, 91, 74, 0.3); }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }

        .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: linear-gradient(90deg, var(--primary), #0f6b57); color: white; padding: 1.75rem 2rem; }

        .main-content { padding: 2.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); }

        input, select, textarea {
            width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;
        }
        textarea { font-family: inherit; line-height: 1.6; }

        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(11, 91, 74, 0.15);
        }

        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
        .preview-btn { background: var(--accent); color: #1a2521; font-weight: 600; }

        .contacts-section { border: 2px solid #e5e7eb; border-radius: 12px; padding: 15px; background: #fafcfc; }
        .contacts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .contacts-list { max-height: 420px; overflow-y: auto; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px 10px; border-radius: 8px; transition: background 0.2s; }
        .contact-item:hover { background: #f0f7f5; }
        .contact-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); }

        .email-preview {
            border: 2px solid #e5e7eb; 
            border-radius: 12px; 
            padding: 25px; 
            background: white;
            min-height: 380px; 
            overflow-y: auto; 
            line-height: 1.7;
        }
        .status { margin-top: 1rem; padding: 12px; border-radius: 8px; text-align: center; font-weight: 500; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header class="header">
        <div style="max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;font-size:1.5rem;font-weight:700;">
                <i class="fas fa-mosque"></i>
                <span>Mohammadia Center</span>
            </div>
            <h1 style="font-size:1.4rem;">Professional Email System</h1>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Send Official Communication</h2>
            </div>

            <div class="main-content">
                <button id="loginBtn" style="padding:16px 40px;font-size:1.1rem;">
                    <i class="fas fa-sign-in-alt"></i> Sign in with Microsoft
                </button>

                <div id="emailForm" style="display:none; margin-top:2rem;">
                    <div class="form-grid">
                        <!-- Left Column -->
                        <div>
                            <div class="form-group">
                                <label>Manual To (Optional)</label>
                                <input type="email" id="to" placeholder="recipient@example.com">
                            </div>
                            <div class="form-group">
                                <label>CC (Optional)</label>
                                <input type="email" id="cc" placeholder="cc@example.com">
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-address-book"></i> Contacts</label>
                                <button onclick="loadContacts()" style="margin-bottom:12px;">
                                    <i class="fas fa-sync"></i> Load My Contacts
                                </button>
                                <div class="contacts-section">
                                    <div class="contacts-header">
                                        <label style="margin:0; cursor:pointer;">
                                            <input type="checkbox" id="selectAllMaster" onchange="toggleSelectAll(this)">
                                            <strong>Select All Contacts</strong>
                                        </label>
                                        <span id="count" style="font-size:0.9rem;color:#666;"></span>
                                    </div>
                                    <div class="contacts-list" id="contactsList"></div>
                                </div>
                                <div style="margin-top:12px; display:flex; gap:8px;">
                                    <button onclick="selectAllContacts()" style="flex:1;">Select All</button>
                                    <button onclick="clearSelection()" style="flex:1;">Clear</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <button onclick="sendToAllContacts()" style="background:#D4AF37; color:#1a2521; width:100%;">
                                    <i class="fas fa-users"></i> Send to ALL Contacts
                                </button>
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div>
                            <div class="form-group">
                                <label>Subject</label>
                                <input type="text" id="subject" placeholder="Subject">
                            </div>

                            <div class="form-group">
                                <label>Email Template</label>
                                <div style="display:flex; gap:10px;">
                                    <select id="templateSelect" style="flex:1;" onchange="previewTemplate()">
                                        <option value="plain">No Template (Plain Text)</option>
                                        <option value="announcement" selected>Event Announcement</option>
                                        <option value="reminder">Prayer / Event Reminder</option>
                                        <option value="newsletter">Monthly Newsletter</option>
                                        <option value="donation">Donation Appeal</option>
                                        <option value="thankyou">Thank You Note</option>
                                    </select>
                                    <button class="preview-btn" onclick="previewTemplate()">
                                        <i class="fas fa-eye"></i> Preview
                                    </button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Your Custom Message</label>
                                <textarea id="body" rows="14" placeholder="Write your message here..." oninput="previewTemplate()"></textarea>
                            </div>

                            <div class="form-group">
                                <label>HTML Email Preview</label>
                                <div id="htmlPreview" class="email-preview"></div>
                            </div>
                        </div>
                    </div>

                    <div style="text-align:center; margin-top:2rem;">
                        <button id="sendBtn" style="padding:16px 40px; font-size:1.2rem;" onclick="sendEmail(false)">
                            <i class="fas fa-paper-plane"></i> Send to Selected Recipients
                        </button>
                    </div>

                    <div id="status" class="status" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad",
                authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6",
                redirectUri: "https://mohammadiacenter.github.io/eventsschedule/email.html"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allContacts = [];

        const templates = {
            plain: { header: "", footer: "", subject: "" },
            announcement: {
                subject: "Important Announcement - Mohammadia Center",
                header: `<div style="background:#0B5B4A;color:white;padding:30px 20px;text-align:center;border-radius:10px 10px 0 0;"><h2>🌟 Important Announcement</h2></div><div style="padding:30px 25px;line-height:1.7;">`,
                footer: `<p>JazakAllah khair for your continued support.</p><p>Best regards,<br><strong>Mohammadia Center Team</strong></p></div>`
            },
            reminder: {
                subject: "Reminder - Mohammadia Center",
                header: `<div style="background:linear-gradient(#0B5B4A,#0f6b57);color:white;padding:35px;text-align:center;border-radius:10px 10px 0 0;"><h2>🕌 Event Reminder</h2></div><div style="padding:30px 25px;line-height:1.7;">`,
                footer: `<p>Please make every effort to attend. May Allah accept from us all.</p><p>Best regards,<br><strong>Mohammadia Center Team</strong></p></div>`
            },
            newsletter: {
                subject: "Mohammadia Center Monthly Newsletter",
                header: `<div style="padding:25px 20px;background:#f8f9f7;border-radius:10px 10px 0 0;"><h2 style="color:#0B5B4A;">Mohammadia Center Newsletter</h2></div><div style="padding:25px;line-height:1.7;">`,
                footer: `<p style="margin-top:30px;text-align:center;">JazakAllah khair<br><strong>Mohammadia Center Team</strong></p></div>`
            },
            donation: {
                subject: "Support Our Masjid Project - Mohammadia Center",
                header: `<div style="background:#0B5B4A;color:white;padding:30px;text-align:center;"><h2>🤲 Your Support Matters</h2></div><div style="padding:30px 25px;line-height:1.7;">`,
                footer: `<p>May Allah (SWT) reward you abundantly for your generosity.</p><p>Best regards,<br><strong>Mohammadia Center Team</strong></p></div>`
            },
            thankyou: {
                subject: "Thank You - Mohammadia Center",
                header: `<div style="padding:25px 20px;line-height:1.7;"><p>Assalamu Alaikum wa Rahmatullahi wa Barakatuh,</p>`,
                footer: `<p>May Allah accept your good deeds and reward you immensely.</p><p>With gratitude,<br><strong>Mohammadia Center Team</strong></p></div>`
            }
        };

        document.getElementById("loginBtn").onclick = async () => {
            try {
                await msalInstance.loginPopup({ scopes: ["Mail.Send", "User.Read", "Contacts.Read"] });
                document.getElementById("emailForm").style.display = "block";
                document.getElementById("loginBtn").style.display = "none";
            } catch (e) { alert("Login failed."); }
        };

        // === Contacts Functions ===
        async function loadContacts() {
            const status = document.getElementById("status");
            status.style.display = "block";
            status.textContent = "Loading contacts...";
            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Contacts.Read"] });
                const res = await fetch("https://graph.microsoft.com/v1.0/me/contacts?$top=200&$select=displayName,emailAddresses", {
                    headers: { Authorization: `Bearer ${token.accessToken}` }
                });
                const data = await res.json();
                allContacts = data.value || [];
                renderContacts();
                status.style.display = "none";
            } catch (err) {
                status.textContent = "❌ Could not load contacts.";
                status.className = "status error";
            }
        }

        function renderContacts() {
            const container = document.getElementById("contactsList");
            container.innerHTML = allContacts.map(contact => `
                <div class="contact-item">
                    <input type="checkbox" class="contact-check" data-email="${contact.emailAddresses?.[0]?.address || ''}">
                    <div>
                        <strong>${contact.displayName || 'Unnamed'}</strong><br>
                        <small>${contact.emailAddresses?.[0]?.address || 'No email'}</small>
                    </div>
                </div>
            `).join('');
            document.getElementById("count").textContent = `${allContacts.length} contacts`;
        }

        function toggleSelectAll(cb) { document.querySelectorAll('.contact-check').forEach(c => c.checked = cb.checked); }
        function selectAllContacts() { document.getElementById("selectAllMaster").checked = true; toggleSelectAll(document.getElementById("selectAllMaster")); }
        function clearSelection() { document.getElementById("selectAllMaster").checked = false; toggleSelectAll(document.getElementById("selectAllMaster")); }
        function getSelectedEmails() {
            return Array.from(document.querySelectorAll('.contact-check:checked')).map(cb => cb.dataset.email).filter(Boolean);
        }

        function nl2br(str) {
            return str ? str.replace(/\n/g, '<br>') : '';
        }

        function previewTemplate() {
            const templateKey = document.getElementById("templateSelect").value;
            const customMsg = document.getElementById("body").value.trim();
            const previewDiv = document.getElementById("htmlPreview");
            const tmpl = templates[templateKey];

            let htmlContent = '';

            if (templateKey === "plain") {
                htmlContent = nl2br(customMsg) || '<p style="color:#888;">Your message will appear here...</p>';
            } else {
                const userMessage = customMsg 
                    ? `<br><p style="margin: 25px 0 25px 0;">${nl2br(customMsg)}</p><br>` 
                    : `<br><p style="margin: 25px 0 25px 0; color:#888; font-style:italic;">[Your custom message will appear here]</p><br>`;

                htmlContent = tmpl.header + userMessage + tmpl.footer;
            }

            previewDiv.innerHTML = htmlContent;
        }

        async function sendEmail(toAll = false) {
            const status = document.getElementById("status");
            status.style.display = "block";
            status.textContent = "Sending...";
            status.className = "status";

            try {
                const tokenResponse = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });
                const templateKey = document.getElementById("templateSelect").value;
                const customBody = document.getElementById("body").value.trim();
                const tmpl = templates[templateKey];

                let finalHtml = '';

                if (templateKey === "plain") {
                    finalHtml = nl2br(customBody);
                } else {
                    const messagePart = customBody 
                        ? `<br><p style="margin: 25px 0 25px 0;">${nl2br(customBody)}</p><br>` 
                        : '';
                    finalHtml = tmpl.header + messagePart + tmpl.footer;
                }

                let recipients = toAll 
                    ? allContacts.map(c => c.emailAddresses?.[0]?.address).filter(Boolean)
                    : [...getSelectedEmails(), document.getElementById("to").value].filter(Boolean);

                if (recipients.length === 0) throw new Error("No recipients");

                const emailData = {
                    message: {
                        subject: document.getElementById("subject").value || tmpl.subject || "Message from Mohammadia Center",
                        body: { contentType: "HTML", content: finalHtml || "<p>No content</p>" },
                        toRecipients: recipients.map(email => ({ emailAddress: { address: email } }))
                    }
                };

                const cc = document.getElementById("cc").value.trim();
                if (cc) emailData.message.ccRecipients = [{ emailAddress: { address: cc } }];

                const response = await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${tokenResponse.accessToken}`, "Content-Type": "application/json" },
                    body: JSON.stringify(emailData)
                });

                if (response.ok) {
                    status.textContent = `✅ Sent successfully to ${recipients.length} recipient(s)!`;
                    status.className = "status success";
                } else throw new Error();
            } catch (err) {
                status.textContent = "❌ Failed to send email.";
                status.className = "status error";
            }
        }

        function sendToAllContacts() {
            if (allContacts.length === 0) return alert("Please load contacts first.");
            if (confirm(`Send to all ${allContacts.length} contacts?`)) sendEmail(true);
        }

        // Auto preview
        document.getElementById("body").addEventListener("input", previewTemplate);
        document.getElementById("templateSelect").addEventListener("change", previewTemplate);
    </script>
</body>
</html>
