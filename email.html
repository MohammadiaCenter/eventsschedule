<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammadia Center | Professional Email System</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #0B5B4A;
            --accent: #D4AF37;
            --dark: #1a2521;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f9f7 0%, #e8edeb 100%);
        }

        .header { background: var(--primary); color: white; padding: 1.5rem 0; box-shadow: 0 4px 12px rgba(11, 91, 74, 0.3); }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }

        .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: linear-gradient(90deg, var(--primary), #0f6b57); color: white; padding: 1.75rem 2rem; }

        .main-content { padding: 2.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); }

        input, select, textarea {
            width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;
        }
        textarea { font-family: inherit; line-height: 1.6; }

        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(11, 91, 74, 0.15);
        }

        button {
            background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer;
        }
        .preview-btn { background: var(--accent); color: #1a2521; font-weight: 600; }

        .email-preview {
            border: 2px solid #e5e7eb; border-radius: 12px; padding: 25px; background: white;
            min-height: 320px; overflow-y: auto; line-height: 1.7; white-space: pre-line;
        }

        .contacts-list {
            max-height: 380px; overflow-y: auto; border: 2px solid #e5e7eb; border-radius: 8px; padding: 10px;
        }
        .contact-item {
            padding: 8px 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px;
        }
        .contact-item:last-child { border-bottom: none; }

        .status { margin-top: 1rem; padding: 12px; border-radius: 8px; text-align: center; font-weight: 500; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header class="header">
        <div style="max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;font-size:1.5rem;font-weight:700;">
                <i class="fas fa-mosque"></i>
                <span>Mohammadia Center</span>
            </div>
            <h1 style="font-size:1.4rem;">Professional Email System</h1>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Send Official Communication</h2>
            </div>

            <div class="main-content">
                <button id="loginBtn" style="padding:16px 40px;font-size:1.1rem;">
                    <i class="fas fa-sign-in-alt"></i> Sign in with Microsoft
                </button>

                <div id="emailForm" style="display:none; margin-top:2rem;">
                    <div class="form-grid">
                        <!-- Left Column: Recipients -->
                        <div>
                            <div class="form-group">
                                <label>Manual Recipients (To)</label>
                                <input type="text" id="to" placeholder="recipient@example.com">
                            </div>

                            <div class="form-group">
                                <label>CC (Optional)</label>
                                <input type="email" id="cc" placeholder="cc@example.com">
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-address-book"></i> Contacts</label>
                                <button onclick="loadContacts()" style="margin-bottom:10px;">
                                    <i class="fas fa-sync"></i> Load My Contacts
                                </button>
                                <div class="contacts-list" id="contactsList">
                                    <!-- Contacts loaded here -->
                                </div>
                                <div style="margin-top:10px;">
                                    <button onclick="selectAllContacts()">Select All</button>
                                    <button onclick="clearSelection()">Clear</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <button onclick="sendToAllContacts()" style="background:#D4AF37; color:#1a2521; width:100%;">
                                    <i class="fas fa-users"></i> Send to ALL Contacts
                                </button>
                            </div>
                        </div>

                        <!-- Right Column: Message -->
                        <div>
                            <div class="form-group">
                                <label>Subject</label>
                                <input type="text" id="subject" placeholder="Subject" required>
                            </div>

                            <div class="form-group">
                                <label>Email Template</label>
                                <div style="display:flex; gap:10px;">
                                    <select id="templateSelect" style="flex:1;">
                                        <option value="plain">No Template (Plain Text)</option>
                                        <option value="announcement">Event Announcement</option>
                                        <option value="reminder">Prayer / Event Reminder</option>
                                        <option value="newsletter">Monthly Newsletter</option>
                                        <option value="donation">Donation Appeal</option>
                                        <option value="thankyou">Thank You Note</option>
                                    </select>
                                    <button class="preview-btn" onclick="previewTemplate()">
                                        <i class="fas fa-eye"></i> Preview
                                    </button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Your Custom Message</label>
                                <textarea id="body" rows="14" placeholder="Write your message here...&#10;New lines are preserved"></textarea>
                            </div>

                            <div class="form-group">
                                <label>HTML Email Preview</label>
                                <div id="htmlPreview" class="email-preview"></div>
                            </div>
                        </div>
                    </div>

                    <div style="text-align:center; margin-top:2rem;">
                        <button id="sendBtn" style="padding:16px 40px; font-size:1.2rem;">
                            <i class="fas fa-paper-plane"></i> Send to Selected Recipients
                        </button>
                    </div>

                    <div id="status" class="status" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const msalConfig = { /* same as before */ 
            auth: {
                clientId: "de2ead7b-e1f3-4075-8140-8db0e317ecad",
                authority: "https://login.microsoftonline.com/165d4bba-ab23-41e4-bafc-d15a2f8ab1c6",
                redirectUri: "https://mohammadiacenter.github.io/eventsschedule/email.html"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let allContacts = [];

        // Templates (same as previous version - kept for brevity)
        const templates = { /* ... same templates as last version ... */ };

        document.getElementById("loginBtn").onclick = async () => {
            try {
                await msalInstance.loginPopup({ 
                    scopes: ["Mail.Send", "User.Read", "Contacts.Read"] 
                });
                document.getElementById("emailForm").style.display = "block";
                document.getElementById("loginBtn").style.display = "none";
            } catch (e) {
                alert("Login failed.");
            }
        };

        async function loadContacts() {
            const status = document.getElementById("status");
            status.style.display = "block";
            status.textContent = "Loading contacts...";

            try {
                const token = await msalInstance.acquireTokenSilent({ scopes: ["Contacts.Read"] });
                const res = await fetch("https://graph.microsoft.com/v1.0/me/contacts?$top=200", {
                    headers: { Authorization: `Bearer ${token.accessToken}` }
                });
                const data = await res.json();
                allContacts = data.value || [];
                renderContacts();
                status.style.display = "none";
            } catch (err) {
                status.textContent = "❌ Could not load contacts.";
                status.className = "status error";
            }
        }

        function renderContacts() {
            const container = document.getElementById("contactsList");
            container.innerHTML = allContacts.map(contact => `
                <div class="contact-item">
                    <input type="checkbox" class="contact-check" 
                           data-email="${contact.emailAddresses?.[0]?.address || ''}">
                    <div>
                        <strong>${contact.displayName || 'No Name'}</strong><br>
                        <small>${contact.emailAddresses?.[0]?.address || 'No email'}</small>
                    </div>
                </div>
            `).join('');
        }

        function selectAllContacts() {
            document.querySelectorAll('.contact-check').forEach(cb => cb.checked = true);
        }

        function clearSelection() {
            document.querySelectorAll('.contact-check').forEach(cb => cb.checked = false);
        }

        function getSelectedEmails() {
            return Array.from(document.querySelectorAll('.contact-check:checked'))
                        .map(cb => cb.dataset.email)
                        .filter(email => email);
        }

        async function sendToAllContacts() {
            if (!allContacts.length) {
                alert("Please load contacts first.");
                return;
            }
            if (!confirm(`Send to ALL ${allContacts.length} contacts?`)) return;
            sendEmail(true);
        }

        document.getElementById("sendBtn").onclick = () => sendEmail(false);

        async function sendEmail(toAll = false) {
            const status = document.getElementById("status");
            status.style.display = "block";
            status.textContent = "Sending...";
            status.className = "status";

            try {
                const tokenResponse = await msalInstance.acquireTokenSilent({ scopes: ["Mail.Send"] });

                const templateKey = document.getElementById("templateSelect").value;
                const customBody = document.getElementById("body").value.trim();
                const tmpl = templates[templateKey] || {header:"", footer:""};

                const messageHtml = customBody ? customBody.replace(/\n/g, '<br>') : '';

                let finalHtml = templateKey === "plain" 
                    ? messageHtml 
                    : tmpl.header + messageHtml + tmpl.footer;

                const toEmails = toAll 
                    ? allContacts.map(c => c.emailAddresses?.[0]?.address).filter(Boolean)
                    : [...getSelectedEmails(), document.getElementById("to").value].filter(Boolean);

                if (toEmails.length === 0) throw new Error("No recipients");

                const emailData = {
                    message: {
                        subject: document.getElementById("subject").value || tmpl.subject || "Message from Mohammadia Center",
                        body: { contentType: "HTML", content: finalHtml || "<p>No content</p>" },
                        toRecipients: toEmails.map(email => ({ emailAddress: { address: email } }))
                    }
                };

                const cc = document.getElementById("cc").value.trim();
                if (cc) emailData.message.ccRecipients = [{ emailAddress: { address: cc } }];

                const response = await fetch("https://graph.microsoft.com/v1.0/me/sendMail", {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer ${tokenResponse.accessToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(emailData)
                });

                if (response.ok) {
                    status.textContent = `✅ Email sent successfully to ${toEmails.length} recipient(s)!`;
                    status.className = "status success";
                } else throw new Error();
            } catch (err) {
                status.textContent = "❌ Failed to send email.";
                status.className = "status error";
            }
        }

        // Preview functions (same as previous)
        function nl2br(str) { return str ? str.replace(/\n/g, '<br>') : ''; }

        function previewTemplate() {
            const templateKey = document.getElementById("templateSelect").value;
            const customMsg = document.getElementById("body").value;
            const previewDiv = document.getElementById("htmlPreview");
            const tmpl = templates[templateKey] || {header:"", footer:""};

            let content = templateKey === "plain" 
                ? nl2br(customMsg) 
                : tmpl.header + nl2br(customMsg) + tmpl.footer;

            previewDiv.innerHTML = content || '<p style="color:#888;">Preview will appear here...</p>';
        }

        // Live preview
        document.getElementById("body").addEventListener("input", previewTemplate);
        document.getElementById("templateSelect").addEventListener("change", previewTemplate);
    </script>
</body>
</html>
